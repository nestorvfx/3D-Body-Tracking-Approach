# Conda environment for training the commercial-clean 3D body tracking model.
# Pinned versions verified to work on Windows 11 + RTX 4050 (Ada, CC 8.9) with
# CUDA 12.4 drivers.  All packages are Apache-2.0 / BSD / MIT / PSF / similar.

name: bodytrack
channels:
  - nvidia
  - pytorch
  - conda-forge

dependencies:
  - python=3.11

  # Installed via pip to pick the CUDA-12.4 wheels directly.
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch==2.6.0
      - torchvision==0.21.0

      # Vision + pose libs
      - timm==1.0.26            # Apache-2.0 (incl. MobileNetV4 weights)
      - opencv-python==4.13.0.92
      - albumentations==2.0.8   # MIT
      - scikit-image==0.26.0    # BSD
      - Pillow==12.1.1

      # Training infra
      - tensorboard==2.20.0
      - pyyaml==6.0.3
      - tqdm==4.67.3

      # Misc
      - numpy==2.4.3

# --------------------------------------------------------------------------
# Install:
#   conda env create -f training/environment.yml
#   conda activate bodytrack
# Verify:
#   python -c "import torch; print(torch.cuda.get_device_name(0))"
# --------------------------------------------------------------------------
